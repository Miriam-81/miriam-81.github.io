<div class="section-wrapper">
    <section class="section extra" id="contact">
        <div>
            <div class="section-heading" id="chat-text">Contact</div>
            
            <p class="paragraph-text justify-text">
                If you're interested in learning Korean, please feel free to contact me: <a href="mailto:{{ site.email }}">{{ site.email }}</a>. It might take me up to a day to get back, but rest assured, you'll hear from me soon.
            </p>
            
            <p class="paragraph-text justify-text">
                My CV is available here: <a href="assets/cv.pdf" target="_blank">Download CV (PDF)</a>
            </p>
            
            <div class="extra-links">
                <span class="hint--bottom bottom-link" aria-label="Email">
                    <a href="mailto:{{ site.email }}"><i class="head-icon fas fa-envelope"></i></a>
                </span>
                <span class="hint--bottom bottom-link" aria-label="GitHub">
                    <a href="https://github.com/{{ site.github_username }}" target="_blank"><i class="head-icon fab fa-github"></i></a>
                </span>
            </div>
        </div>
    </section>
</div>
