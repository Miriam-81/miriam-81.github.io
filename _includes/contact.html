<div class="section-wrapper">
    <section class="section extra" id="contact">
        <div>
            <div class="section-heading" id="chat-text">Contact</div>
            
            <p class="paragraph-text justify-text" style="color: #dfdfdf; line-height: 1.7;">
                If you are interested in learning Korean or have any questions about my lessons, please feel free to contact me at <a href="mailto:{{ site.email }}" style="color: #3498db; font-weight: bold;">{{ site.email }}</a>. It might take me up to a day to respond, but rest assured, you will hear back from me soon.
            </p>
            
            <p class="paragraph-text justify-text" style="color: #dfdfdf; margin-top: 20px;">
                My CV is available here: <a href="{{ site.baseurl }}/assets/cv.pdf" target="_blank" style="color: #3498db; font-weight: bold; border: 1px solid #3498db; padding: 4px 10px; border-radius: 4px; margin-left: 5px; font-size: 0.9rem;">Download CV (PDF)</a>
            </p>
            
            <div class="extra-links" style="margin-top: 30px;">
                <span class="hint--bottom bottom-link" aria-label="Email">
                    <a href="mailto:{{ site.email }}"><i class="head-icon fas fa-envelope"></i></a>
                </span>
                <span class="hint--bottom bottom-link" aria-label="GitHub">
                    <a href="https://github.com/{{ site.github_username }}" target="_blank"><i class="head-icon fab fa-github"></i></a>
                </span>
            </div>
        </div>
    </section>
</div>
